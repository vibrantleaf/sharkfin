name: sharkfin
description: just my personal bluefin.
base-image: ghcr.io/ublue-os/bluefin-dx
image-version: latest

modules:

  # copy files to the image
  - type: files
    files:
      - source: system
        destination: /

  # setup copr & rpm repos for build
  - type: script
    scripts:
      - setup_repos.sh
      
  # removed packages
  - type: rpm-ostree
    remove:
      - gnome-shell-extension-search-light
      - gnome-shell-extension-logo-menu
      - gnome-classic-session
      - gnome-classic-session-xsession
      - yaru-theme
      - containerd.io
      - docker-ce
      - docker-ce-cli
      - docker-buildx-plugin
      - docker-compose-plugin
      - docker-ce-rootless-extras
      - devpod
      
  # added packages
  - type: rpm-ostree
    install:
      - gnome-shell-extension-caffeine
      - podman-docker
      - podman-compose
      - duperemove
      - corectrl
      - qt5-qtbase
      - qt6ct
      - mangohud
      - gamescope
      - gamemode
      - sunshine
      - libvirt-client
      - qemu-kvm
      - libvirt-daemon-kvm
      - libvirt-daemon-config-network
      - virt-install
      - virt-manager
      - edk2-ovmf
      - swtpm
      - virt-top
      - libguestfs-tools
      - tuned
      - bridge-utils
      - android-tools
      - scrcpy
      - waydroid
  
  # make sure codecs are installed    
  - type: rpm-ostree
    install:
      - libdvdcss
      - gstreamer1-plugin-libav
      - gstreamer1-plugins-bad-free-extras
      - gstreamer1-plugins-bad-freeworld
      - gstreamer1-plugins-ugly
      - gstreamer1-vaapi
      - ffmpeg
      
  # make sure rpmfusion firmware installed 
  - type: script
    snippets:
      - "rpm-ostree install *-firmware"
 
# steam
  - type: script
    snippets:
      - "rpm-ostree install libva"
      - "rpm-ostree override replace --experimental --from repo='fedora' libva"
      - "rpm-ostree install steam"

# flathub
  - type: default-flatpaks
    notify: true 
    system:
    repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
    repo-name: flathub
    repo-title: "Flathub (System)"
      
# install flatpaks
  - type: yafti
    custom-flatpaks:
      - FireFox: org.mozilla.firefox
      - LibreOffice: org.libreoffice.libreoffice
      - ThunderBird: org.mozilla.Thunderbird
      - LocalSend: org.localsend.localsend_app
      - Collision: dev.geopjr.Collision
      - Secrets: org.gnome.World.Secrets
      - ProtonPlus: com.vysp3r.ProtonPlus
      - Lutris: net.lutris.Lutris
      - Flatseal: com.github.tchx84.Flatseal
      #- Steam: com.valvesoftware.Steam
      - AdwSteamGTK (GTK4/LibAdwata Themer for Steam): io.github.Foldex.AdwSteamGtk
      - AddWater (GTK4/LibAdwata Themer for Firefox): dev.qwery.AddWater

  # systemd services
  - type: systemd
    system:
      enabled:
        - libvirtd.service
        - libvirtd.socket
        - podman.socket
    user:
      enabled:
        - podman.socket

  # udev-rules
  - type: script
    snippets: 
      - "git clone https://github.com/fabiscafe/game-devices-udev.git /var/tmp/game-devices-udev"
      - "git clone https://github.com/wget/realtek-r8152-linux.git /var/tmp/realtek-r8152-udev"
      - "cp -rfv /var/tmp/game-devices-udev/*.rules /usr/share/ublue-os/udev-rules/etc/udev/rules.d"
      - "cp -rfv /var/tmp/realtek-r8152-udev/*.rules /usr/share/ublue-os/udev-rules/etc/udev/rules.d"
      - "rm -rfv /var/tmp/game-devices-udev /var/tmp/realtek-r8152-udev"
  - type: rpm-ostree
    install:
      - openrgb-udev-rules
      - steam-devices
      - solaar-udev
      
 # justfiles
  - type: justfiles
    validate: true
    #validate: false
    include:
      - 95-sharkfin-waydroid.just

  # gnome extentions
  - type: gnome-extensions
    install:
      - 4655
      - 6784
      - 3733
      - 5547

  # gnome-settings
  - type: gschema-overrides
    include:
      - gnome_settings.gschema.override

  # unsetup copr & rpm repos for release
  - type: script
    scripts:
      - unsetup_repos.sh
  
  # brand the image
  - type: script
    scripts:
      - branding.sh

  # sign the image
  - type: signing
